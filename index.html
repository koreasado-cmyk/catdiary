<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff8fab">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="냥로그">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='40' fill='%23ffd6e4'/><text x='50%25' y='54%25' font-size='110' text-anchor='middle' dominant-baseline='central'>🐈</text></svg>">
<title>냥로그 · 고양이 건강 다이어리 🐈</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--accent:#ff8fab;--soft:#ffe3ec}
  html,body{height:100%}
  body{
    font-family:'Gaegu','Apple SD Gothic Neo','Hiragino Maru Gothic ProN',sans-serif;color:#5a4a42;
    background:linear-gradient(160deg,#fff9f3,#fdf2f8);
    min-height:100dvh;display:flex;flex-direction:column;
  }
  .wrap{width:100%;max-width:600px;margin:0 auto;flex:1;display:flex;flex-direction:column;min-height:100dvh}
  header.bar{
    position:sticky;top:0;z-index:10;background:var(--accent);color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;display:flex;align-items:center;gap:10px;
    box-shadow:0 3px 12px rgba(0,0,0,.12);transition:background .3s;
  }
  header.bar .back{font-size:24px;background:none;border:none;color:#fff;width:34px;text-align:left;cursor:pointer}
  header.bar .title{font-family:'Jua';font-size:21px;flex:1;text-align:center;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header.bar .gear{font-size:20px;background:none;border:none;color:#fff;width:34px;cursor:pointer}
  main{flex:1;padding:16px 14px 40px}
  h3.sec{font-family:'Jua';font-size:17px;color:#7a6258;margin:18px 2px 10px}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}
  .sechead h3{font-family:'Jua';font-size:17px;color:#7a6258}
  .addmini{background:var(--accent);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1;box-shadow:0 3px 8px rgba(255,120,150,.4)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .tile{background:#fffdfb;border-radius:20px;padding:20px 14px;text-align:center;
    box-shadow:0 8px 18px rgba(255,170,190,.18);border-top:4px solid var(--accent);cursor:pointer;
    transition:transform .2s}
  .tile:active{transform:scale(.97)}
  .tile .emo{font-size:40px}
  .tile .nm{font-family:'Jua';font-size:19px;color:#6b5a52;margin-top:6px}
  .tile .ct{font-size:13px;color:#b8a99f}
  .tile.add{display:flex;flex-direction:column;justify-content:center;align-items:center;
    color:#c9a99b;border:2px dashed #e6c9bd;background:#fff8f4;box-shadow:none}

  .catcard{display:flex;gap:14px;align-items:center;background:#fffdfb;border-radius:18px;
    padding:12px;margin-bottom:12px;box-shadow:0 6px 14px rgba(255,170,190,.16);cursor:pointer;
    border-left:5px solid var(--accent)}
  .catcard:active{transform:scale(.99)}
  .avatar{width:64px;height:64px;flex:0 0 64px;border-radius:50%;object-fit:cover;border:3px solid #fff;
    box-shadow:0 3px 8px rgba(0,0,0,.12);background:#ffe3ec center/cover}
  .avatar.sm{width:46px;height:46px;flex-basis:46px;border-width:2px;font-size:22px}
  .avatar.ph{display:grid;place-items:center;font-size:30px}
  .catcard .meta{flex:1;min-width:0}
  .catcard .meta .nm{font-family:'Jua';font-size:20px;color:#6b5a52}
  .catcard .meta .sub{font-size:14px;color:#a07e6f}
  .chev{color:#d9c4b8;font-size:22px}

  .hero{position:relative;border-radius:22px;overflow:hidden;border:4px solid #fff;
    box-shadow:0 10px 26px rgba(0,0,0,.14);aspect-ratio:4/5;margin-bottom:8px;background:#ffe3ec center/cover}
  .hero.ph{display:grid;place-items:center;font-size:64px}
  .hero img{width:100%;height:100%;object-fit:cover}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:30px 16px 14px;color:#fff;
    background:linear-gradient(transparent,rgba(0,0,0,.55))}
  .hero .cap h2{font-family:'Jua';font-size:28px}
  .hero .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .hero .badge{background:rgba(255,255,255,.92);color:#6b5a52;font-weight:700;font-size:13px;padding:3px 10px;border-radius:999px}

  .tabs2{display:flex;gap:6px;margin:14px 0 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs2::-webkit-scrollbar{display:none}
  .seg{display:flex;gap:6px;margin:14px 0 6px}
  .tabs2 button,.seg button{flex:1;border:none;background:#fff;color:#b8a99f;font-family:'Jua';font-size:14px;
    padding:10px 8px;border-radius:12px;cursor:pointer;white-space:nowrap}
  .tabs2 button{flex:0 0 auto;padding:10px 14px}
  .tabs2 button.on,.seg button.on{background:var(--accent);color:#fff}

  .card{background:#fffdfb;border-radius:18px;padding:14px 16px;margin-top:12px;
    box-shadow:0 6px 16px rgba(255,170,190,.16)}
  .card h4{font-family:'Jua';font-size:16px;color:#7a6258;margin-bottom:8px}
  .desc{font-size:17px;line-height:1.5;color:#6b5a52}
  .nick{color:var(--accent);font-weight:700;font-size:16px;margin:8px 0 0}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed #f0e3db;font-size:15px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:#a07e6f}.kv .v{color:#6b5a52;font-weight:700;text-align:right}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .chip{font-size:13px;background:var(--soft);color:#7a6258;border-radius:999px;padding:4px 11px;font-weight:700}

  .entry{background:#fffdfb;border-radius:16px;padding:12px 14px;margin-bottom:10px;
    box-shadow:0 5px 12px rgba(255,170,190,.14);border-left:5px solid var(--accent);cursor:pointer}
  .entry .d{font-size:13px;color:#b8a99f;display:flex;justify-content:space-between;align-items:center}
  .entry .t{font-family:'Jua';font-size:17px;color:#6b5a52;margin:2px 0}
  .entry .b{font-size:16px;color:#6b5a52;white-space:pre-wrap;line-height:1.5}
  .entry .mood{font-size:18px}
  .entry .thumb{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-top:8px}
  .empty{text-align:center;color:#bbab9f;padding:24px;font-size:15px}

  .rchips{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 2px}
  .rchip{font-size:13px;background:#f4ece7;color:#7a6258;border-radius:9px;padding:3px 9px;font-weight:700}
  .rchip.warn{background:#fde2e2;color:#cf5b5b}

  .anniv{display:flex;align-items:center;gap:12px;background:#fffdfb;border-radius:16px;padding:12px 14px;
    margin-bottom:10px;box-shadow:0 5px 12px rgba(255,170,190,.14);cursor:pointer}
  .anniv .dday{font-family:'Jua';font-size:18px;color:var(--accent);min-width:64px;text-align:center}
  .anniv .info{flex:1;min-width:0}
  .anniv .info .t{font-size:16px;color:#6b5a52;font-weight:700}
  .anniv .info .s{font-size:13px;color:#a07e6f}
  .anniv .xdel{background:none;border:none;color:#e0a0a0;font-size:18px;padding:6px 8px;cursor:pointer}

  .todo{display:flex;align-items:center;gap:12px;background:#fffdfb;border-radius:16px;padding:10px 14px;
    margin-bottom:10px;box-shadow:0 5px 12px rgba(255,170,190,.14)}
  .todo .meta{flex:1;min-width:0}
  .todo .meta .nm{font-family:'Jua';font-size:17px;color:#6b5a52}
  .todo .meta .sub{font-size:13px;color:#a07e6f}
  .todo .act{border:none;border-radius:999px;padding:8px 14px;font-family:'Jua';font-size:14px;cursor:pointer}
  .todo .act.go{background:var(--accent);color:#fff}
  .todo .act.done{background:#dff3e3;color:#3f9d56}
  .alertcard{background:#fff4f4;border:1px solid #f6d7d7;border-radius:16px;padding:12px 14px;margin-bottom:10px}
  .alertcard .nm{font-family:'Jua';font-size:16px;color:#cf5b5b}
  .alertcard .rs{font-size:14px;color:#b06a6a;margin-top:2px}

  .fab{position:fixed;right:max(16px,calc(50% - 300px + 16px));bottom:calc(env(safe-area-inset-bottom) + 18px);
    width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:30px;
    box-shadow:0 8px 20px rgba(255,120,150,.5);cursor:pointer;z-index:20;line-height:1}

  label.fld{display:block;margin:12px 0 4px;font-size:14px;font-weight:700;color:#8a7166}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;font-family:inherit;font-size:16px;color:#5a4a42;border:1px solid #ecd9cf;
    border-radius:12px;padding:11px 12px;background:#fff}
  textarea{min-height:90px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  .moodpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .moodpick button{font-size:24px;background:#fff;border:2px solid #ecd9cf;border-radius:12px;width:48px;height:48px;cursor:pointer}
  .moodpick button.on{border-color:var(--accent);background:var(--soft)}
  .recfield{margin-top:14px}
  .recfield .rl{font-size:15px;font-weight:700;color:#8a7166;margin-bottom:2px}
  .recseg{display:flex;gap:6px;flex-wrap:wrap}
  .recseg button{border:2px solid #ecd9cf;background:#fff;color:#8a7166;border-radius:12px;padding:8px 13px;
    font-family:'Gaegu',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
  .recseg button.on{border-color:var(--accent);background:var(--soft);color:#6b5a52}
  .photo-pick{display:flex;align-items:center;gap:14px;margin:10px 0}
  .photo-pick .pv{width:84px;height:84px;border-radius:16px;object-fit:cover;background:#ffe3ec center/cover;
    display:grid;place-items:center;font-size:30px;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.1)}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:14px;font-family:'Jua';font-size:17px;cursor:pointer;margin-top:18px}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:#fff;color:#a07e6f;border:1px solid #ecd9cf;margin-top:10px}
  .btn.danger{background:#fff;color:#e08a8a;border:1px solid #f0d2d2;margin-top:10px}
  .row2{display:flex;gap:10px}.row2>*{flex:1}

  .cal{background:#fffdfb;border-radius:16px;padding:10px 12px;margin-top:6px;box-shadow:0 6px 16px rgba(255,170,190,.16)}
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .cal-head .mo{font-family:'Jua';font-size:17px;color:#6b5a52}
  .cal-head button{background:var(--soft);border:none;color:#7a6258;width:34px;height:34px;border-radius:10px;font-size:18px;cursor:pointer}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{font-size:11px;color:#b8a99f;text-align:center;padding:3px 0}
  .cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;padding-top:4px;font-size:13px;color:#7a6258;cursor:pointer;background:#faf3ee}
  .cal-cell.blank{background:transparent;cursor:default}
  .cal-cell.has{background:var(--soft);font-weight:700;color:#6b5a52}
  .cal-cell.today{outline:2px solid var(--accent)}
  .cal-cell .dots{display:flex;gap:2px;margin-top:3px}
  .cdot{width:6px;height:6px;border-radius:50%}
  .cdot.v{background:#e76f6f}.cdot.p{background:#e0b34d}.cdot.m{background:#7fb5e6}.cdot.h{background:#9b7fd6}.cdot.g{background:#7bc47f}
  .calleg{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#a07e6f;margin-top:8px;justify-content:center}
  .calleg span{display:flex;align-items:center;gap:4px}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .statbox{background:#faf3ee;border-radius:14px;padding:12px;text-align:center}
  .statbox .n{font-family:'Jua';font-size:24px;color:#6b5a52}
  .statbox .n.warn{color:#cf5b5b}
  .statbox .l{font-size:13px;color:#a07e6f;margin-top:2px}
  .chartwrap{width:100%;overflow:hidden}
  svg.chart{width:100%;height:auto;display:block}
  .wlabel{display:flex;justify-content:space-between;font-size:13px;color:#a07e6f;margin-top:4px}

  .report .rhead{text-align:center;margin-bottom:6px}
  .report .rhead h2{font-family:'Jua';font-size:22px;color:#6b5a52}
  .report .rhead .sub{font-size:14px;color:#a07e6f}
  .report .rrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed #f0e3db;font-size:15px}
  .report .rrow .k{color:#a07e6f}.report .rrow .v{color:#6b5a52;font-weight:700;text-align:right}
  .report .rrow .v.warn{color:#cf5b5b}
  .evline{font-size:14px;color:#6b5a52;padding:4px 0;border-bottom:1px dotted #f0e3db}
  .evline .dt{color:#a07e6f;margin-right:6px}

  .syncpill{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 18px);
    background:#5a4a42;color:#fff;font-size:13px;padding:7px 14px;border-radius:999px;opacity:0;
    transition:.3s;z-index:30;pointer-events:none}
  .syncpill.show{opacity:.92}
  .note{font-size:13.5px;color:#7c655a;line-height:1.65;background:var(--soft);border-radius:12px;padding:12px;margin-top:10px;white-space:pre-line;font-family:'Apple SD Gothic Neo','Hiragino Sans','Noto Sans JP',sans-serif}
  .status{font-size:13px;padding:6px 10px;border-radius:999px;display:inline-block;margin-top:6px}
  .status.cloud{background:#dff3e3;color:#3f9d56}
  .status.local{background:#fde9d6;color:#cf8a2b}
  code{background:#fff;border:1px solid #eee;border-radius:6px;padding:1px 5px;font-size:13px}

  /* 오늘 기록 상태 칩 */
  .dchip,.todo .stat{font-size:12px;font-weight:700;border-radius:999px;padding:2px 9px;display:inline-block;font-family:'Apple SD Gothic Neo','Hiragino Sans',sans-serif}
  .dchip.done,.todo .stat.done{background:#dff3e3;color:#3f9d56}
  .dchip.todo,.todo .stat.todo{background:#fde9d6;color:#cf8a2b}
  .todo.done{opacity:.95}
  .todo .act.view{background:#eef6ef;color:#3f9d56}
  /* 기록 화면 기본/상세 분리 */
  h4.recsec{font-family:'Jua';font-size:16px;color:#7a6258;margin:18px 2px 2px}
  .moretoggle{display:block;width:100%;background:#fff8f4;border:1px dashed #e6c9bd;color:#a07e6f;
    border-radius:12px;padding:12px;font-family:'Jua';font-size:15px;cursor:pointer;margin-top:18px}
  .morewrap{margin-top:2px}
  /* 설정 고급 접기 */
  details.adv{margin-top:12px;background:#fffdfb;border-radius:18px;box-shadow:0 6px 16px rgba(255,170,190,.16);overflow:hidden}
  details.adv>summary{list-style:none;cursor:pointer;padding:14px 16px;font-family:'Jua';font-size:16px;color:#7a6258}
  details.adv>summary::-webkit-details-marker{display:none}
  details.adv>summary::after{content:'▾';float:right;color:#c9b3a8}
  details.adv[open]>summary::after{content:'▴'}
  details.adv .inner{padding:0 16px 16px}

  @media print{
    header.bar,.fab,.tabs2,.seg,.syncpill,#back,#gear,.noprint{display:none!important}
    body{background:#fff}.wrap{max-width:100%}main{padding:0}
    .card{box-shadow:none;border:1px solid #eee}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <button class="back" id="back" style="visibility:hidden">‹</button>
    <div class="title" id="title">키코다이어리 🐈</div>
    <button class="gear" id="gear">⚙</button>
  </header>
  <main id="view"></main>
</div>
<div class="syncpill" id="pill">저장됨 ✓</div>

<script>
window.__SEED__ = {"categories": [{"id": "home", "name": "집냥이", "emoji": "🏠"}, {"id": "street", "name": "길냥이", "emoji": "🐾"}], "cats": [], "anniversaries": [], "diary": [], "vet": []};
window.__SEED_PHOTOS__ = {};
</script>
<script src="app.js"></script>
</body>
</html>
